name: Feature request
description: Propose a focused Venom improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem or limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change and expected developer experience.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility impact
      description: Explain effects on fail-closed behavior, browser compatibility, formats, or performance.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
