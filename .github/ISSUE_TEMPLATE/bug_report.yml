name: Bug report
description: Report a reproducible compiler, runtime, build, or compatibility problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "For security vulnerabilities, follow SECURITY.md instead of opening a public issue."
  - type: input
    id: version
    attributes:
      label: Venom version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake, Python, Emscripten, browser, and architecture.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and logs
    validations:
      required: true
