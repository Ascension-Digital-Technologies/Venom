name: Security model question
description: Ask about supported hardening, deployment, threat boundaries, or release verification. Do not report vulnerabilities here.
title: "[security-question]: "
labels: ["security", "question"]
body:
  - type: markdown
    attributes:
      value: Vulnerabilities must be reported privately according to SECURITY.md.
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Deployment or threat context
