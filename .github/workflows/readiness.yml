name: Production readiness report

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness-tool:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate readiness tool
        run: python tests/package/production-readiness-report-smoke.py
      - name: Validate source inventory
        run: python tools/check_source_inventory.py .
