name: build
on: [push, pull_request]
permissions:
  contents: read
jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Generated contracts
        run: python tools/generate_host_api.py --check
      - name: Verify product contract bindings
        run: python tools/generate_product_contracts.py --check
      - name: Source inventory
        run: python tools/check_source_inventory.py .
      - name: Configure
        run: cmake --preset dev -DVENOM_ENABLE_IPO=OFF
      - name: Build
        run: cmake --build --preset dev --parallel 2
      - name: Doctor contract
        shell: bash
        run: ./build/dev/venom doctor --format json || test $? -eq 50
      - name: Test
        run: ctest --preset dev --output-on-failure
