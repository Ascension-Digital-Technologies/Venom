name: Real browser validation

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  browser-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EMSDK_VERSION: 4.0.10
      SOURCE_DATE_EPOCH: 1704067200
      VENOM_QJS_ABI_MODE: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: build/emsdk
          key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}
      - name: Install Playwright browsers
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium firefox webkit
      - name: Build real QuickJS/WASM runtime
        run: |
          scripts/setup-emscripten.sh --version "$EMSDK_VERSION" --emsdk-dir build/emsdk
          source build/emsdk/emsdk_env.sh
          python tools/build_emscripten.py --repo-root . --out-dir build/emscripten-build --emsdk-dir build/emsdk --skip-native-rebuild --skip-runtime-smoke
      - name: Build Venom
        run: |
          cmake --preset release-closure
          cmake --build --preset release-closure --parallel 2
      - name: Build compatibility fixtures
        run: |
          ./build/release-closure/venom build tests/fixtures/sites/browser-compat-site --out build/browser-dist
          ./build/release-closure/venom build tests/fixtures/sites/no-script-site --out build/static-dist
          ./build/release-closure/venom build tests/fixtures/sites/production-bundle-site --out build/production-bundle-dist
          ./build/release-closure/venom build tests/fixtures/sites/react16-umd-site --out build/react16-dist
          ./build/release-closure/venom build tests/fixtures/sites/dom-compat-site --out build/dom-compat-dist
          ./build/release-closure/venom build tests/fixtures/sites/dynamic-bundle-site --out build/dynamic-bundle-dist
          ./build/release-closure/venom build tests/fixtures/sites/react-vite-modern-site --out build/react-vite-modern-dist
          ./build/release-closure/venom build tests/fixtures/sites/vue-vite-modern-site --out build/vue-vite-modern-dist
          ./build/release-closure/venom build tests/fixtures/sites/svelte-vite-modern-site --out build/svelte-vite-modern-dist
      - name: Validate Chromium, Firefox, and WebKit
        run: |
          python tools/browser_validation.py build/browser-dist --browser all --manifest tests/fixtures/sites/browser-compat-site/venom.browser.json --json-out build/browser-validation.json
          python tools/browser_validation.py build/static-dist --browser all --manifest tests/fixtures/sites/no-script-site/venom.browser.json --json-out build/static-browser-validation.json
          python tools/browser_validation.py build/production-bundle-dist --browser all --manifest tests/fixtures/sites/production-bundle-site/venom.browser.json --json-out build/production-bundle-validation.json
          python tools/browser_validation.py build/react16-dist --browser all --manifest tests/fixtures/sites/react16-umd-site/venom.browser.json --json-out build/react16-browser-validation.json
          python tools/browser_validation.py build/dom-compat-dist --browser all --manifest tests/fixtures/sites/dom-compat-site/venom.browser.json --json-out build/dom-compat-browser-validation.json
          python tools/browser_validation.py build/dynamic-bundle-dist --browser all --manifest tests/fixtures/sites/dynamic-bundle-site/venom.browser.json --json-out build/dynamic-bundle-browser-validation.json
          python tools/browser_validation.py build/react-vite-modern-dist --browser all --manifest tests/fixtures/sites/react-vite-modern-site/venom.browser.json --json-out build/react-vite-modern-browser-validation.json
          python tools/browser_validation.py build/vue-vite-modern-dist --browser all --manifest tests/fixtures/sites/vue-vite-modern-site/venom.browser.json --json-out build/vue-vite-modern-browser-validation.json
          python tools/browser_validation.py build/svelte-vite-modern-dist --browser all --manifest tests/fixtures/sites/svelte-vite-modern-site/venom.browser.json --json-out build/svelte-vite-modern-browser-validation.json
          python tools/compatibility_matrix.py build/browser-validation.json build/static-browser-validation.json build/production-bundle-validation.json build/react16-browser-validation.json build/dom-compat-browser-validation.json build/dynamic-bundle-browser-validation.json build/react-vite-modern-browser-validation.json build/vue-vite-modern-browser-validation.json build/svelte-vite-modern-browser-validation.json --json-out build/compatibility-matrix.json --markdown-out build/COMPATIBILITY.md
          python tools/browser_performance.py build/browser-validation.json build/static-browser-validation.json build/production-bundle-validation.json build/react16-browser-validation.json build/dom-compat-browser-validation.json build/dynamic-bundle-browser-validation.json build/react-vite-modern-browser-validation.json build/vue-vite-modern-browser-validation.json build/svelte-vite-modern-browser-validation.json --json-out build/browser-performance.json
          python tools/package_compatibility_evidence.py --matrix build/compatibility-matrix.json --reports build/browser-validation.json build/static-browser-validation.json build/production-bundle-validation.json build/react16-browser-validation.json build/dom-compat-browser-validation.json build/dynamic-bundle-browser-validation.json build/react-vite-modern-browser-validation.json build/vue-vite-modern-browser-validation.json build/svelte-vite-modern-browser-validation.json --manifests tests/fixtures/sites/browser-compat-site/venom.browser.json tests/fixtures/sites/no-script-site/venom.browser.json tests/fixtures/sites/production-bundle-site/venom.browser.json tests/fixtures/sites/react16-umd-site/venom.browser.json tests/fixtures/sites/dom-compat-site/venom.browser.json tests/fixtures/sites/dynamic-bundle-site/venom.browser.json tests/fixtures/sites/react-vite-modern-site/venom.browser.json tests/fixtures/sites/vue-vite-modern-site/venom.browser.json tests/fixtures/sites/svelte-vite-modern-site/venom.browser.json --out build/venom-compatibility-evidence.zip --source-revision "${GITHUB_SHA}"
          python tools/verify_compatibility_evidence.py build/venom-compatibility-evidence.zip
      - name: Verify consolidated readiness
        run: |
          python tools/production_readiness.py tests/fixtures/sites/browser-compat-site \
            --dist build/browser-dist \
            --venom ./build/release-closure/venom \
            --require-real-engine \
            --browser-report build/browser-validation.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-validation-report
          path: |
            build/browser-validation.json
            build/static-browser-validation.json
            build/production-bundle-validation.json
            build/react16-browser-validation.json
            build/dom-compat-browser-validation.json
            build/dynamic-bundle-browser-validation.json
            build/react-vite-modern-browser-validation.json
            build/vue-vite-modern-browser-validation.json
            build/svelte-vite-modern-browser-validation.json
            build/compatibility-matrix.json
            build/COMPATIBILITY.md
            build/browser-performance.json
            build/venom-compatibility-evidence.zip
