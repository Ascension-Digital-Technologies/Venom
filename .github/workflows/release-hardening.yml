name: Release Hardening

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Source and contract gates
        run: |
          python tools/verify_contract_lock.py --repo-root .
          python tools/documentation_gate.py
          python tools/check_source_inventory.py .
          python tools/architecture/check_domain_dependencies.py .
          python tools/check_example_registry.py .
          python tools/generate_example_launchers.py --repo-root . --check
          python tools/check_generated_artifacts.py .
          python tests/package/error-api-smoke.py .
          python tests/package/source-layout-smoke.py .
          python tests/package/typescript-frontend-integration-smoke.py
      - name: Node-free native configuration
        run: cmake -S . -B build-hardening -DCMAKE_BUILD_TYPE=Release -DVENOM_ENABLE_NODE_ECOSYSTEM_TESTS=OFF
