name: release qualification
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  qualify-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      SOURCE_DATE_EPOCH: 1704067200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - name: Install and verify Venom JS hardener
        run: ./scripts/setup-js-hardener.sh
      - run: npm install --no-save playwright@1.52.0 && npx playwright install --with-deps chromium firefox webkit
      - run: cmake --preset release -DVENOM_ENABLE_IPO=OFF
      - run: cmake --build --preset release --parallel 2
      - run: python tools/release_qualification.py --venom build/release/venom --browser all --seed 1350001
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-qualification-linux
          path: |
            build/protected-chess-browser.json
            build/qualified-chess-dist
  qualify-windows:
    runs-on: windows-latest
    timeout-minutes: 75
    env:
      SOURCE_DATE_EPOCH: 1704067200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - name: Install and verify Venom JS hardener
        shell: pwsh
        run: .\scripts\setup-js-hardener.ps1 -NoPause
      - run: npm install --no-save playwright@1.52.0
      - run: npx playwright install chromium
      - run: cmake --preset release -DVENOM_ENABLE_IPO=OFF
      - run: cmake --build --preset release --config Release --parallel 2
      - shell: pwsh
        run: |
          $venom = Get-ChildItem build/release -Recurse -Filter venom.exe | Select-Object -First 1 -ExpandProperty FullName
          python tools/release_qualification.py --venom $venom --browser chromium --seed 1350001
