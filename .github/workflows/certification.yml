name: Certification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: linux-x64
            os: ubuntu-latest
          - platform_id: windows-x64
            os: windows-latest
          - platform_id: macos-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Configure and build
        run: >-
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DVENOM_ENABLE_NODE_ECOSYSTEM_TESTS=OFF
      - name: Build native compiler
        run: cmake --build build --config Release --parallel 2
      - name: Certify platform
        run: >-
          python tools/certify_release.py --repo-root . --venom build/venom
          --platform-id ${{ matrix.platform_id }}
          --json-out certification/${{ matrix.platform_id }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.platform_id }}
          path: certification/${{ matrix.platform_id }}.json

  browser:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Browser certification
        run: >-
          python tools/browser_validation.py --browser ${{ matrix.browser }}
          --json-out certification/${{ matrix.browser }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: browser-${{ matrix.browser }}
          path: certification/${{ matrix.browser }}.json

  aggregate:
    needs: [platform, browser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: certification/evidence
      - name: Aggregate certification
        run: >-
          python tools/aggregate_certification.py
          --contract contracts/release-certification.json
          --json-out certification/release-certification.json
          --markdown-out certification/release-certification.md
      - uses: actions/upload-artifact@v4
        with:
          name: aggregated-certification
          path: certification/release-certification.*
