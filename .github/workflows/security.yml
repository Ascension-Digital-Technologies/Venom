name: security
on:
  pull_request:
  schedule:
    - cron: '17 4 * * 1'
permissions:
  contents: read
  security-events: write
jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with: {languages: 'c-cpp'}
      - run: cmake -S . -B build/codeql -DVENOM_ENABLE_IPO=OFF
      - run: cmake --build build/codeql --parallel 2
      - uses: github/codeql-action/analyze@v4
  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build/sanitizers -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DVENOM_ENABLE_SANITIZERS=ON -DVENOM_ENABLE_IPO=OFF
      - run: cmake --build build/sanitizers --parallel 2
      - run: ctest --test-dir build/sanitizers --output-on-failure
