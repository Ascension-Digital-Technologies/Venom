name: performance
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  runtime-budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install brotli
      - name: Embedded runtime budgets
        run: python tools/runtime_performance.py --format json --json-out runtime-performance.json
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-performance
          path: runtime-performance.json
