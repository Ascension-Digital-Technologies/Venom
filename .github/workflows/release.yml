name: Signed Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    runs-on: ${{ matrix.os }}
    env:
      VENOM_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.VENOM_RELEASE_PRIVATE_KEY_PEM }}
      VENOM_RELEASE_PUBLIC_KEY_PEM: ${{ secrets.VENOM_RELEASE_PUBLIC_KEY_PEM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVENOM_ENABLE_NODE_ECOSYSTEM_TESTS=OFF
      - name: Build
        run: cmake --build build --config Release --parallel 2
      - name: Write signing keys
        shell: bash
        run: |
          printf '%s' "$VENOM_RELEASE_PRIVATE_KEY_PEM" > release-private.pem
          printf '%s' "$VENOM_RELEASE_PUBLIC_KEY_PEM" > release-public.pem
      - name: Package signed release set
        shell: bash
        run: |
          python tools/package_release_set.py --repo-root . --build-dir build --out release-set \
            --private-key release-private.pem --public-key release-public.pem
          python tools/verify_release_set.py release-set --require-signature --public-key release-public.pem
          test -f release-set/RELEASE_SET.sig
      - uses: actions/upload-artifact@v4
        with:
          name: venom-release-${{ runner.os }}
          path: release-set/
