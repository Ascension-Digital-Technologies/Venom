name: publish-release-artifacts
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SOURCE_DATE_EPOCH: 1704067200
  EMSDK_VERSION: 4.0.10
  VENOM_QJS_ABI_MODE: release

jobs:
  verified-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/cache@v4
        with:
          path: build/emsdk
          key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}
      - name: Build canonical real QuickJS/WASM runtime
        run: |
          bash scripts/linux/build-emsdk.sh --version "$EMSDK_VERSION" --emsdk-dir build/emsdk --out-dir build/emscripten-build --clean --force --skip-native-rebuild --skip-runtime-smoke
          python tools/quickjs_wasm_cutover.py --repo-root . --out-dir build/quickjs-wasm --verify-embedded --require-real
          sha256sum build/quickjs-wasm/quickjs-runtime.wasm src/generated/runtime/quickjs_runtime_wasm_blob.hpp > build/quickjs-wasm/VERIFIED_RUNTIME_SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: venom-verified-runtime
          path: |
            build/quickjs-wasm/quickjs-runtime.wasm
            build/quickjs-wasm/runtime-performance.json
            build/quickjs-wasm/VERIFIED_RUNTIME_SHA256SUMS
            src/generated/runtime/quickjs_runtime_wasm_blob.hpp
          if-no-files-found: error

  release-closure:
    needs: verified-runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/download-artifact@v4
        with:
          name: venom-verified-runtime
          path: verified-runtime
      - name: Install canonical runtime and verify provenance
        run: |
          cp verified-runtime/src/generated/runtime/quickjs_runtime_wasm_blob.hpp src/generated/runtime/quickjs_runtime_wasm_blob.hpp
          mkdir -p build/quickjs-wasm
          cp verified-runtime/build/quickjs-wasm/* build/quickjs-wasm/
          python tools/quickjs_wasm_cutover.py --repo-root . --out-dir build/quickjs-wasm --verify-embedded --require-real
      - name: Build closure with sanitizers and fuzzers
        run: |
          cmake --preset release-closure -DVENOM_BUILD_FUZZERS=ON -DVENOM_ENABLE_SANITIZERS=ON -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build --preset release-closure --parallel 2
          ctest --preset release-closure --output-on-failure
      - name: Fuzz and hostile-input gates
        run: |
          ./build/release-closure/venom_package_parser_fuzz tests/fuzz/corpus/package_parser -runs=20000 -timeout=3
          ./build/release-closure/venom_runtime_contract_fuzz tests/fuzz/corpus/runtime_contracts -runs=20000 -timeout=3
          ./build/release-closure/venom_package_parser_differential_fuzz tests/fuzz/corpus/package_parser -runs=20000 -timeout=3

  package:
    needs: [verified-runtime, release-closure]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux-x64
            target: linux-x64
          - os: windows-latest
            artifact: windows-x64
            target: windows-x64
          - os: macos-latest
            artifact: macos-arm64
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/download-artifact@v4
        with:
          name: venom-verified-runtime
          path: verified-runtime
      - name: Install and verify canonical runtime
        shell: bash
        run: |
          cp verified-runtime/src/generated/runtime/quickjs_runtime_wasm_blob.hpp src/generated/runtime/quickjs_runtime_wasm_blob.hpp
          mkdir -p build/quickjs-wasm
          cp verified-runtime/build/quickjs-wasm/* build/quickjs-wasm/
          python tools/quickjs_wasm_cutover.py --repo-root . --out-dir build/quickjs-wasm --verify-embedded --require-real
      - run: cmake --preset release -DVENOM_ENABLE_IPO=OFF
      - run: cmake --build --preset release --parallel 2
      - name: Package release
        shell: bash
        run: python tools/package_release.py --build-dir build/release --out build/package --archive zip --target-triplet ${{ matrix.target }} --sign none --source-date-epoch "$SOURCE_DATE_EPOCH"
      - name: Verify stable contract manifest
        shell: bash
        run: |
          test -s build/package/CONTRACTS.json
          test -s build/package/SBOM.cdx.json
          test -s build/package/PROVENANCE.intoto.json
          test -s build/package/RELEASE_POLICY.json
          python tools/verify_release.py build/package --expect-version "${GITHUB_REF_NAME#v}" --expect-channel stable --require-supply-chain-metadata || python tools/verify_release.py build/package --require-supply-chain-metadata
          python tools/check_contract_upgrade.py build/package/CONTRACTS.json build/package/CONTRACTS.json
      - uses: actions/upload-artifact@v4
        with:
          name: venom-${{ matrix.artifact }}
          path: venom-v*.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs: [verified-runtime, release-closure, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Verify one runtime digest across release inputs
        run: |
          cat artifacts/venom-verified-runtime/build/quickjs-wasm/VERIFIED_RUNTIME_SHA256SUMS
          test -s artifacts/venom-verified-runtime/build/quickjs-wasm/quickjs-runtime.wasm
      - name: Materialize protected release signing keys
        env:
          VENOM_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.VENOM_RELEASE_PRIVATE_KEY_PEM }}
          VENOM_RELEASE_PUBLIC_KEY_PEM: ${{ secrets.VENOM_RELEASE_PUBLIC_KEY_PEM }}
        run: |
          test -n "$VENOM_RELEASE_PRIVATE_KEY_PEM" || { echo "missing VENOM_RELEASE_PRIVATE_KEY_PEM" >&2; exit 1; }
          test -n "$VENOM_RELEASE_PUBLIC_KEY_PEM" || { echo "missing VENOM_RELEASE_PUBLIC_KEY_PEM" >&2; exit 1; }
          install -m 700 -d "$RUNNER_TEMP/venom-signing"
          printf '%s\n' "$VENOM_RELEASE_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/venom-signing/private.pem"
          printf '%s\n' "$VENOM_RELEASE_PUBLIC_KEY_PEM" > "$RUNNER_TEMP/venom-signing/public.pem"
          chmod 600 "$RUNNER_TEMP/venom-signing/private.pem"
      - name: Create and verify signed release publication set
        run: |
          mapfile -t PACKAGES < <(find artifacts -type f -name 'venom-v*.zip' | sort)
          python tools/package_release_set.py --version "${GITHUB_REF_NAME#v}" --source-revision "$GITHUB_SHA" --packages "${PACKAGES[@]}" --verified-runtime artifacts/venom-verified-runtime/build/quickjs-wasm/quickjs-runtime.wasm --out release-set --archive venom-release-set.zip --source-date-epoch "$SOURCE_DATE_EPOCH" --private-key "$RUNNER_TEMP/venom-signing/private.pem" --public-key "$RUNNER_TEMP/venom-signing/public.pem" --require-signature
          cp artifacts/venom-verified-runtime/build/quickjs-wasm/VERIFIED_RUNTIME_SHA256SUMS release-set/VERIFIED_RUNTIME_SHA256SUMS
          python tools/verify_release_set.py release-set --expect-version "${GITHUB_REF_NAME#v}" --require-runtime --require-signature --public-key "$RUNNER_TEMP/venom-signing/public.pem"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-set/artifacts/*
            release-set/RELEASE_SET.json
            release-set/RELEASE_SET.sig
            release-set/SHA256SUMS
            release-set/VERIFIED_RUNTIME_SHA256SUMS
            venom-release-set.zip
          fail_on_unmatched_files: true
